<header
  class="sticky top-0 z-50 w-full border-b border-gray-200/50 dark:border-gray-800/50 bg-white/70 dark:bg-[#0a0a0a]/70 backdrop-blur-xl transition-all duration-500"
>
  <div class="mx-auto max-w-6xl px-6 md:px-10">
    <div class="flex items-center justify-between py-5">
      
      <button
        (click)="scrollToTop()"
        class="text-xs font-semibold uppercase tracking-[0.4em] text-gray-900 dark:text-white focus-visible:outline-none transition-opacity hover:opacity-70"
      >
        A. ESPINO
      </button>

      <nav
        class="hidden items-center md:ml-auto space-x-12 text-[11px] uppercase tracking-[0.35em] md:flex"
        aria-label="Navegación principal"
      >
        <a
          href="#proyectos"
          class="transition-colors font-medium text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white focus-visible:outline-none"
        >
          PROYECTOS
        </a>
        <a
          href="#experiencia"
          class="transition-colors font-medium text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white focus-visible:outline-none"
        >
          EXPERIENCIA
        </a>
        <a
          href="#contacto"
          class="transition-colors font-medium text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white focus-visible:outline-none"
        >
          CONTACTO
        </a>

        <button 
          (click)="toggleDarkMode()" 
          class="flex h-8 w-8 items-center justify-center rounded-full border border-gray-200 dark:border-gray-800 transition-all duration-300 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none group"
        >
          <svg *ngIf="!isDarkMode" class="h-3.5 w-3.5 text-gray-600 transition-transform group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          
          <svg *ngIf="isDarkMode" class="h-3.5 w-3.5 text-yellow-500 transition-transform group-hover:rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
        </button>
      </nav>

      <div class="flex items-center gap-4 md:hidden">
        <button (click)="toggleDarkMode()" class="p-2 border border-gray-200 dark:border-gray-800 rounded-md active:bg-gray-100 dark:active:bg-gray-900 transition-colors">
            <span class="text-[10px] font-bold tracking-widest dark:text-white">{{ isDarkMode ? 'LIGHT' : 'DARK' }}</span>
        </button>

        <button
          type="button"
          class="inline-flex items-center justify-center rounded-md border border-gray-900 dark:border-white px-3 py-2 text-[10px] font-bold uppercase tracking-[0.35em] text-gray-900 dark:text-white transition-all hover:bg-gray-900 hover:text-white dark:hover:bg-white dark:hover:text-black"
          (click)="toggleMobileMenu()"
        >
          {{ isMobileMenuOpen ? 'CERRAR' : 'MENU' }}
        </button>
      </div>
    </div>

    <nav
      id="mobile-nav"
      class="md:hidden overflow-hidden transition-all duration-300"
      *ngIf="isMobileMenuOpen"
    >
      <div class="border-t border-gray-100 dark:border-gray-800 py-6 flex flex-col space-y-6">
        <a href="#proyectos" (click)="closeMobileMenu()" class="text-[11px] uppercase tracking-[0.4em] text-gray-600 dark:text-gray-400 font-bold hover:text-black dark:hover:text-white">PROYECTOS</a>
        <a href="#experiencia" (click)="closeMobileMenu()" class="text-[11px] uppercase tracking-[0.4em] text-gray-600 dark:text-gray-400 font-bold hover:text-black dark:hover:text-white">EXPERIENCIA</a>
        <a href="#contacto" (click)="closeMobileMenu()" class="text-[11px] uppercase tracking-[0.4em] text-gray-600 dark:text-gray-400 font-bold hover:text-black dark:hover:text-white">CONTACTO</a>
      </div>
    </nav>
  </div>
</header>
