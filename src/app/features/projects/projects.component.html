<section id="proyectos" class="bg-white dark:bg-[#0a0a0a] transition-colors duration-500 scroll-mt-20">
  
  <div class="mx-auto max-w-6xl px-6 pt-14 pb-32 md:px-10 md:pt-20 md:pb-40">
    
    <div class="flex items-end justify-between gap-8 border-b border-gray-100 dark:border-gray-900 pb-8">
      <div class="space-y-3">
        <p class="text-[10px] font-medium uppercase tracking-[0.4em] text-gray-400 dark:text-gray-500">
          SELECCIÓN
        </p>
        <h2 class="font-display text-2xl font-semibold uppercase tracking-[0.3em] text-gray-900 dark:text-white md:text-3xl">
          Proyectos
        </h2>
      </div>
      <a
        href="#contacto"
        class="hidden text-[10px] font-bold uppercase tracking-[0.35em] text-gray-500 dark:text-gray-500 underline-offset-8 transition-all hover:text-black dark:hover:text-white hover:underline md:inline"
      >
        DISPONIBLE PARA COLABORAR
      </a>
    </div>

    <div class="mt-12 grid grid-cols-1 gap-px bg-gray-100 dark:bg-gray-900 md:grid-cols-2 border border-gray-100 dark:border-gray-900">
      
      <a
        *ngFor="let p of projects"
        [href]="p.href || '#'"
        class="group block bg-white dark:bg-[#0a0a0a] p-10 md:p-14 transition-all duration-500 hover:bg-gray-50/50 dark:hover:bg-[#111111]/50 focus-visible:outline-none"
      >
        <div class="flex items-start justify-between gap-6">
          <div class="space-y-4">
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 dark:text-gray-600">
              {{ p.role }}
            </p>
            <h3 class="text-lg font-semibold uppercase tracking-[0.2em] text-gray-900 dark:text-gray-100 transition-colors group-hover:text-black dark:group-hover:text-white">
              {{ p.title }}
            </h3>
          </div>

          <p class="text-[10px] font-medium uppercase tracking-[0.4em] text-gray-300 dark:text-gray-700">
            {{ p.year }}
          </p>
        </div>

        <div class="mt-16 flex items-center justify-between">
          <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 dark:text-gray-500 group-hover:text-black dark:group-hover:text-white transition-colors">
            EXPLORAR PROYECTO
          </span>
          <div class="relative overflow-hidden w-5 h-5 flex items-center justify-center">
            <span class="text-gray-300 dark:text-gray-700 transition-all duration-500 transform group-hover:translate-x-full absolute">→</span>
            <span class="text-black dark:text-white transition-all duration-500 transform -translate-x-full group-hover:translate-x-0 absolute font-bold">→</span>
          </div>
        </div>
      </a>
      
    </div>
  </div>
</section>
