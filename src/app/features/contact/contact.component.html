<section id="contacto" class="reveal bg-white dark:bg-[#0a0a0a] pt-16 pb-8 sm:pt-20 sm:pb-12 md:pt-40 md:pb-24 transition-colors duration-500 scroll-mt-20">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 md:px-10">
    
    <div class="border border-gray-200 dark:border-gray-800 p-4 sm:p-8 md:p-16 transition-all duration-500 hover:border-gray-400 dark:hover:border-gray-600 rounded-lg">
      
      <div class="space-y-2 sm:space-y-4">
        <p class="text-[10px] font-medium uppercase tracking-[0.4em] text-gray-500 dark:text-gray-400">
          CONTACTO
        </p>
        <h2 class="font-display text-xl sm:text-2xl md:text-3xl font-semibold uppercase tracking-[0.38em] text-gray-900 dark:text-white">
          HABLEMOS
        </h2>
      </div>

      <div class="mt-10 sm:mt-16 grid grid-cols-1 gap-8 sm:gap-12 md:grid-cols-2 items-end">
        
        <div class="space-y-6 sm:space-y-8">
          <p class="max-w-xs text-sm leading-relaxed text-gray-600 dark:text-gray-400 sm:text-base">
            Si quieres construir un producto con diseño funcional y ejecución impecable, escríbeme.
          </p>
          <a
            [href]="'mailto:' + email"
            class="inline-block font-display text-base sm:text-xl md:text-2xl font-semibold uppercase tracking-[0.15em] text-gray-900 dark:text-white underline underline-offset-[8px] sm:underline-offset-[12px] decoration-1 transition-all hover:opacity-50 focus-visible:outline-none break-words"
          >
            {{ email }}
          </a>
        </div>

        <div class="space-y-4 sm:space-y-6 md:text-right">
          <p class="text-[10px] font-medium uppercase tracking-[0.4em] text-gray-500 dark:text-gray-400">
            REDES
          </p>
          <div class="flex flex-row sm:flex-col gap-4 sm:gap-6 md:items-end">
            
            <a [href]="githubUrl" target="_blank" class="group flex items-center gap-2 sm:gap-4 text-[11px] font-medium uppercase tracking-[0.35em] text-gray-700 dark:text-gray-400 transition-colors hover:text-black dark:hover:text-white focus-visible:outline-none">
              <span class="border-b border-transparent group-hover:border-black dark:group-hover:border-white transition-all">Github</span>
              <div class="flex h-8 w-8 sm:h-10 sm:w-10 items-center justify-center rounded-full border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 transition-all duration-500 group-hover:bg-black group-hover:text-white dark:group-hover:bg-white dark:group-hover:text-black">
                <svg viewBox="0 0 24 24" class="h-4 w-4 sm:h-5 sm:w-5" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.37-3.37-1.37-.46-1.2-1.12-1.52-1.12-1.52-.92-.64.07-.63.07-.63 1.02.07 1.55 1.08 1.55 1.08.9 1.57 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.38-2.22-.26-4.55-1.14-4.55-5.09 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.27 2.76 1.05A9.18 9.18 0 0 1 12 6.36c.85 0 1.7.12 2.5.34 1.92-1.32 2.76-1.05 2.76-1.05.55 1.42.2 2.47.1 2.73.64.72 1.03 1.63 1.03 2.75 0 3.96-2.34 4.82-4.57 5.08.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .26.18.59.69.48A10.03 10.03 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z"/></svg>
              </div>
            </a>

            <a [href]="linkedinUrl" target="_blank" class="group flex items-center gap-2 sm:gap-4 text-[11px] font-medium uppercase tracking-[0.35em] text-gray-700 dark:text-gray-400 transition-colors hover:text-black dark:hover:text-white focus-visible:outline-none">
              <span class="border-b border-transparent group-hover:border-black dark:group-hover:border-white transition-all">LinkedIn</span>
              <div class="flex h-8 w-8 sm:h-10 sm:w-10 items-center justify-center rounded-full border border-gray-200 dark:border-gray-800 text-gray-900 dark:text-gray-100 transition-all duration-500 group-hover:bg-black group-hover:text-white dark:group-hover:bg-white dark:group-hover:text-black">
                <svg viewBox="0 0 24 24" class="h-4 w-4 sm:h-5 sm:w-5" fill="currentColor"><path d="M4.98 3.5C4.98 4.88 3.9 6 2.5 6S0 4.88 0 3.5 1.08 1 2.5 1s2.48 1.12 2.48 2.5ZM.25 8.25h4.5V23.5H.25V8.25Zm7.75 0h4.31v2.08h.06c.6-1.13 2.06-2.33 4.24-2.33 4.54 0 5.38 2.99 5.38 6.88v8.62h-4.5V15.9c0-1.81-.03-4.13-2.52-4.13-2.52 0-2.9 1.97-2.9 4v7.73H8V8.25Z"/></svg>
              </div>
            </a>
          </div>
        </div>
      </div>

      <div class="mt-16 sm:mt-24 border-t border-gray-100 dark:border-gray-800 pt-6 sm:pt-8 flex flex-col md:flex-row justify-between items-center gap-2 sm:gap-4">
        <p class="text-[10px] uppercase tracking-[0.4em] text-gray-400 dark:text-gray-500 text-center md:text-left">
          © {{ year }} ANTHONY ESPINO
        </p>
        <p class="text-[9px] uppercase tracking-[0.2em] text-gray-300 dark:text-gray-600 text-center md:text-right">
          Hecho con Angular & Tailwind
        </p>
      </div>

    </div> 
  </div>
</section>
